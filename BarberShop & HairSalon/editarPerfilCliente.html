<!DOCTYPE html><!--Ga-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Perfil de Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style2.css">
</head>
<body id="usuario">

  <!-- barra de navegación -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">BarberShop & HairSalon</a>
    </div>
  </nav>

  <!-- fondo -->
  <div class="register-bg d-flex align-items-center justify-content-center">
    <div class="register-card shadow-lg w-100" style="max-width: 600px;">
      <h2 class="text-center mb-4">Editar Perfil de Cliente</h2>

      <form action="#" method="post">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre Completo</label>
          <input type="text" id="nombre" name="nombre" class="form-control" value="Juan Pérez" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" id="email" name="email" class="form-control" value="juanperez@email.com" required>
        </div>

        <div class="mb-3">
          <label for="telefono" class="form-label">Teléfono</label>
          <input type="text" id="telefono" name="telefono" class="form-control" value="+56912345678" required>
        </div>

        <p><strong>Tipo de Usuario:</strong> Cliente</p>

        <div class="d-flex justify-content-end gap-2">
          <button type="submit" class="btn btn-success">Guardar Cambios</button>
          <a href="perfilCliente.html" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html><!--Ga-->
