<!DOCTYPE html><!--Ga-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliminar Cuenta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style2.css">
</head>
<body id="usuario">

  <!-- barra de navegación -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">BarberShop & HairSalon</a>
    </div>
  </nav>

  <!-- fondo -->
  <div class="register-bg d-flex align-items-center justify-content-center">
    <div class="register-card shadow-lg w-100" style="max-width: 600px;">
      <h2 class="text-center mb-4 text-danger">Eliminar Cuenta</h2>
      <p class="text-center"> Esta acción es permanente. Si eliminas tu cuenta, perderás tu historial de citas y compras.</p>

      <!-- Formulario de confirmación -->
      <form action="#" method="post">
        <div class="mb-3">
          <label for="password" class="form-label">Confirma tu contraseña</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Escribe tu contraseña" required>
        </div>

        <!-- botones -->
        <div class="d-flex justify-content-between">
          <a href="perfil.html" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-danger">Eliminar Definitivamente</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts2.js"></script>
</body>
</html><!--Ga-->
