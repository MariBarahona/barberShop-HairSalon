<!DOCTYPE html><!--Ga-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style2.css">
</head>
<body id="usuario">

  <!-- barra de navegación -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">BarberShop & HairSalon</a>
    </div>
  </nav>

  <!-- fondo con degradado -->
  <div class="register-bg d-flex align-items-center justify-content-center">
    <div class="register-card shadow-lg">
      <h2 class="text-center mb-4">Iniciar Sesión</h2>
      <form action="#" method="post">
        
        <!-- correo -->
        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="Correo Electrónico" required>
        </div>

        <!-- contraseña -->
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required>
        </div>

        <!-- recordar sesión -->
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="recordar" name="recordar">
          <label class="form-check-label" for="recordar">Recordar sesión</label>
        </div>

        <!-- boton -->
        <button type="submit" class="btn btn-success w-100">Ingresar</button>
      </form>

      <!-- enlace a registro -->
      <p class="text-center mt-3">
        ¿No tienes cuenta? <a href="usuario.html">Crear cuenta</a>
      </p>
      <p class="text-center mt-3">
        ¿Olvidaste tu contraseña? <a href="contrasenaOlvidada.html">Recuperar contraseña</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts2.js"></script>
</body>
</html><!--Ga-->
