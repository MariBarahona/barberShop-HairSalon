<!DOCTYPE html><!--Ga-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style2.css">
</head>
<body id="usuario">

  <!-- barra de navegación -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">BarberShop & HairSalon</a>
    </div>
  </nav>

  <!-- fondo con degradado -->
  <div class="register-bg d-flex align-items-center justify-content-center">
    <div class="register-card shadow-lg">
      <h2 class="text-center mb-4">Crear Cuenta</h2>

      <!-- FORMULARIO CON ID REGISTROFORM -->
      <form id="registroForm" action="#" method="post">
        <!-- nombre -->
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre Completo</label>
          <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Escribe tu nombre" required>
        </div>

        <!-- correo -->
        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@email.com" required>
        </div>

        <!-- contraseña -->
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="Crea una contraseña" required>
        </div>

        <!-- tipo de usuario -->
        <div class="mb-3">
          <label class="form-label">Tipo de Usuario</label><br>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipo_usuario" id="cliente" value="cliente" required>
            <label class="form-check-label" for="cliente">Cliente</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipo_usuario" id="trabajador" value="trabajador">
            <label class="form-check-label" for="trabajador">Trabajador</label>
          </div>
        </div>

        <!-- rol de trabajador -->
        <div class="mb-3">
          <label for="rol" class="form-label">Rol (si eres trabajador)</label>
          <select id="rol" name="rol" class="form-select">
            <option value="">-- Seleccionar --</option>
            <option value="barbero">Barbero</option>
            <option value="estilista">Estilista</option>
          </select>
        </div>

        <!-- boton -->
        <button type="submit" class="btn btn-success w-100">Registrarse</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- JS del proyecto -->
  <script src="assets/scripts2.js"></script>
</body>
</html><!--Ga-->
